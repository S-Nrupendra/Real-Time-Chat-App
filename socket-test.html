<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Socket.io Test</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
    #messages { border: 1px solid #ccc; height: 300px; overflow-y: auto; padding: 10px; margin-bottom: 10px; }
    #log { border: 1px solid #f90; height: 150px; overflow-y: auto; padding: 10px; background: #fff8e1; margin-bottom: 10px; font-size: 12px; }
    input { width: 70%; padding: 8px; }
    button { padding: 8px 16px; margin-left: 5px; }
    .connected { color: green; }
    .disconnected { color: red; }
  </style>
</head>
<body>
  <h2>Socket.io Test Client</h2>

  <div>
    <strong>Status:</strong>
    <span id="status" class="disconnected">Disconnected</span>
  </div>

  <br>

  <div>
    <input type="text" id="token" placeholder="Paste your JWT token here" style="width:100%" />
    <button onclick="connect()">Connect</button>
    <button onclick="disconnect()">Disconnect</button>
  </div>

  <br>

  <h4>Messages:</h4>
  <div id="messages"></div>

  <input type="text" id="messageInput" placeholder="Type a message..." />
  <button onclick="sendMessage()">Send</button>
  <button onclick="startTyping()">Typing</button>

  <h4>Event Log:</h4>
  <div id="log"></div>

  <script>
    let socket = null;

    function log(msg) {
      const div = document.getElementById('log');
      div.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
      div.scrollTop = div.scrollHeight;
    }

    function addMessage(msg) {
      const div = document.getElementById('messages');
      div.innerHTML += `<div><strong>${msg.sender?.username || 'unknown'}:</strong> ${msg.content}</div>`;
      div.scrollTop = div.scrollHeight;
    }

    function connect() {
      const token = document.getElementById('token').value.trim();
      if (!token) { alert('Paste your JWT token first'); return; }

      socket = io('http://localhost:5000', {
        auth: { token }
      });

      socket.on('connect', () => {
        document.getElementById('status').textContent = 'Connected ✓';
        document.getElementById('status').className = 'connected';
        log('Connected to server');
      });

      socket.on('disconnect', () => {
        document.getElementById('status').textContent = 'Disconnected';
        document.getElementById('status').className = 'disconnected';
        log('Disconnected from server');
      });

      socket.on('connect_error', (err) => {
        log(`Connection error: ${err.message}`);
      });

      socket.on('receive_message', (message) => {
        log(`receive_message event: ${message.content}`);
        addMessage(message);
      });

      socket.on('user_online', (data) => {
        log(`user_online: ${data.username}`);
      });

      socket.on('user_offline', (data) => {
        log(`user_offline: ${data.username}`);
      });

      socket.on('typing', (data) => {
        log(`typing: ${data.username}`);
      });

      socket.on('stop_typing', (data) => {
        log(`stop_typing: ${data.username}`);
      });

      socket.on('message_deleted', (data) => {
        log(`message_deleted: ${data.messageId}`);
      });

      socket.on('error', (data) => {
        log(`Error: ${data.message}`);
      });
    }

    function disconnect() {
      if (socket) socket.disconnect();
    }

    function sendMessage() {
      const input = document.getElementById('messageInput');
      const content = input.value.trim();
      if (!content || !socket) return;
      socket.emit('send_message', { content });
      input.value = '';
    }

    function startTyping() {
      if (!socket) return;
      socket.emit('typing');
      setTimeout(() => socket.emit('stop_typing'), 2000);
    }
  </script>
</body>
</html>
